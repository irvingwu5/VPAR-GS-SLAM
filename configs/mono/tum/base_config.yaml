Results:
  save_results: True
  save_dir: "results"
  save_trj: True
  save_trj_kf_intv: 10
  use_gui: True
  eval_rendering: False
  use_wandb: False

Dataset:
  type: 'tum'
  sensor_type: 'monocular'
  pcd_downsample: 64
  pcd_downsample_init: 32
  adaptive_pointsize: True
  point_size: 0.01

Training:
  init_itr_num: 1050
  init_gaussian_update: 100
  init_gaussian_reset: 500
  init_gaussian_th: 0.005
  init_gaussian_extent: 30
  tracking_itr_num: 100
  mapping_itr_num: 150
  gaussian_update_every: 150
  gaussian_update_offset: 50
  gaussian_th: 0.7
  gaussian_extent: 1.0
  gaussian_reset: 2001
  size_threshold: 20
  kf_interval: 5
  window_size: 8
  pose_window: 3
  edge_threshold: 1.1
  rgb_boundary_threshold: 0.01

  kf_translation: 0.08
  kf_min_translation: 0.05
  kf_overlap: 0.9
  kf_cutoff: 0.3
  prune_mode: 'slam'
  single_thread: False
  spherical_harmonics: False

  lr:
    cam_rot_delta: 0.003
    cam_trans_delta: 0.001

opt_params:
  iterations: 30000
  position_lr_init: 0.0016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.001
  rotation_lr: 0.001
  percent_dense: 0.01
  lambda_dssim: 0.2
  lambda_normal: 0.0          # normal consistency loss weight (2DGS: 0.05)
  lambda_dist: 0.0            # depth distortion loss weight (2DGS: 1.0)
  normal_start_iter: 7000     # enable normal loss after this many mapping iters
  dist_start_iter: 3000       # enable distortion loss after this many mapping iters
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002

model_params:
  sh_degree: 0
  source_path: ""
  model_path: ""
  resolution: -1
  white_background: False
  data_device: "cuda"

pipeline_params:
  convert_SHs_python: False
  compute_cov3D_python: False

# ========== VO Prior (DPVO) ==========
VOPrior:
  enabled: False
  type: "dpvo"
  warmup_frames: 10
  tracking_itr_accepted: 60
  tracking_itr_fallback: 100
  flow_quality_thresh: 1.5
  dpvo_queue_timeout: 0.5
  dpvo_device_id: 0          # GPU device for DPVO (0=share, 1=separate GPU)

DPVO:
  weight_path: "submodules/DPVO/models/dpvo.pth"
  config_file: "submodules/DPVO/config/default.yaml"
  BUFFER_SIZE: 512
  PATCHES_PER_FRAME: 48
  OPTIMIZATION_WINDOW: 10
  PATCH_LIFETIME: 13
  REMOVAL_WINDOW: 22
  KEYFRAME_THRESH: 15.0
